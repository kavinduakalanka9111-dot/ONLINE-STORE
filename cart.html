<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - ONLINE STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
      tailwind.config = { theme: { extend: { colors: { brand: '#0f172a', accent: '#3b82f6' } } } }
    </script>
</head>
<body class="bg-gray-50 text-gray-800">
    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 shadow-sm border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <a href="index.html" class="text-2xl font-black tracking-tighter text-brand flex items-center gap-2">
                    <div class="bg-accent text-white p-2 rounded-lg"><i class="fa-solid fa-store"></i></div> ONLINE STORE
                </a>
                <div class="hidden md:flex space-x-8 items-center bg-gray-50 px-6 py-2 rounded-full border border-gray-100">
                    <a href="index.html" class="text-gray-500 hover:text-accent font-medium transition duration-300">Home</a>
                    <a href="products.html" class="text-gray-500 hover:text-accent font-medium transition duration-300">Shop</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Cart Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16 fade-in">
        <h1 class="text-4xl font-black text-gray-900 mb-10 flex items-center gap-4">
            Shopping Cart <span class="bg-blue-100 text-accent text-sm px-3 py-1 rounded-full cart-badge">0</span>
        </h1>
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            <div class="lg:col-span-2" id="cart-items-container">
                <!-- Items injected here by JS -->
            </div>
            
            <!-- Order Summary -->
            <div class="lg:col-span-1" id="cart-summary" style="display:none;">
                <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-8 sticky top-28">
                    <h3 class="text-2xl font-bold text-gray-900 mb-6 pb-4 border-b border-gray-100">Order Summary</h3>
                    
                    <div class="space-y-4 mb-6">
                        <div class="flex justify-between text-gray-600 font-medium">
                            <span>Subtotal</span>
                            <span id="cart-subtotal">LKR 0.00</span>
                        </div>
                        <div class="flex justify-between text-gray-600 font-medium pb-4 border-b border-gray-100">
                            <span>Shipping</span>
                            <span class="text-emerald-500 font-bold">Free</span>
                        </div>
                    </div>
                    
                    <div class="flex justify-between text-xl font-black text-gray-900 mb-8 pt-2">
                        <span>Grand Total</span>
                        <span id="cart-total-amount">LKR 0.00</span>
                    </div>
                    
                    <button id="show-checkout-btn" onclick="document.getElementById('checkout-form').classList.remove('hidden'); this.style.display='none';" class="w-full bg-brand hover:bg-accent text-white py-4 rounded-xl font-bold text-lg transition duration-300 shadow-xl flex items-center justify-center gap-3">
                        Proceed to Checkout <i class="fa-solid fa-arrow-right"></i>
                    </button>

                    <form id="checkout-form" class="mt-6 border-t border-gray-100 pt-6 space-y-4 hidden" onsubmit="window.placeOrderFirebase(event)">
                        <h4 class="font-bold text-gray-800 mb-2">Delivery Details</h4>
                        <input type="text" id="order-name" placeholder="Your Full Name" required class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:outline-none focus:ring-accent">
                        <input type="tel" id="order-phone" placeholder="Phone Number" required class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:outline-none focus:ring-accent">
                        <textarea id="order-address" placeholder="Delivery Address" required class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:outline-none focus:ring-accent resize-none"></textarea>
                        <button type="submit" class="w-full bg-brand hover:bg-accent text-white py-4 rounded-xl font-bold text-lg transition duration-300 shadow-xl mt-4 flex items-center justify-center gap-2">
                            Place Order Now <i class="fa-solid fa-check"></i>
                        </button>
                    </form>
                    
                    <div class="mt-6 flex justify-center gap-3 opacity-50">
                        <i class="fa-brands fa-cc-visa text-3xl"></i>
                        <i class="fa-brands fa-cc-mastercard text-3xl"></i>
                        <i class="fa-brands fa-cc-paypal text-3xl"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
