<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - ONLINE STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {brand: '#0f172a', accent: '#3b82f6'}
          }
        }
      }
    </script>
</head>
<body class="bg-gray-50 text-gray-800">
    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 shadow-sm border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <a href="index.html" class="text-2xl font-black tracking-tighter text-brand flex items-center gap-2">
                    <div class="bg-accent text-white p-2 rounded-lg"><i class="fa-solid fa-store"></i></div> ONLINE STORE
                </a>
                <div class="hidden md:flex space-x-8 items-center bg-gray-50 px-6 py-2 rounded-full border border-gray-100">
                    <a href="index.html" class="text-gray-500 hover:text-accent font-medium transition duration-300">Home</a>
                    <a href="products.html" class="text-accent font-bold transition duration-300 relative after:content-[''] after:absolute after:-bottom-2 after:left-0 after:w-full after:h-0.5 after:bg-accent">Shop</a>
                    <a href="track.html" class="text-gray-500 hover:text-emerald-500 font-medium transition duration-300">Track Order</a>
                    <a href="about.html" class="text-gray-500 hover:text-accent font-medium transition duration-300">About</a>
                    <a href="contact.html" class="text-gray-500 hover:text-accent font-medium transition duration-300">Contact</a>
                </div>
                <div class="flex items-center gap-4">
                    <a href="cart.html" class="relative text-brand hover:text-accent transition duration-300 bg-gray-100 p-3 rounded-full">
                        <i class="fa-solid fa-cart-shopping text-xl"></i><span class="cart-badge absolute -top-1 -right-1 bg-red-500 shadow-md text-white md text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center" style="display:none;">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="bg-brand py-16 text-center">
        <h1 class="text-4xl md:text-5xl font-black text-white mb-4">All Products</h1>
        <p class="text-gray-400 text-lg">Browse our premium collection of handpicked items</p>
    </div>

    <!-- Products Grid -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16 fade-in">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="flex gap-2 w-full md:w-auto overflow-x-auto pb-2">
                <button class="bg-accent text-white px-6 py-2 rounded-full font-semibold shadow-md whitespace-nowrap">All</button>
                <button class="bg-white border border-gray-200 hover:bg-gray-50 px-6 py-2 rounded-full font-semibold text-gray-700 whitespace-nowrap">Clothing</button>
                <button class="bg-white border border-gray-200 hover:bg-gray-50 px-6 py-2 rounded-full font-semibold text-gray-700 whitespace-nowrap">Electronics</button>
                <button class="bg-white border border-gray-200 hover:bg-gray-50 px-6 py-2 rounded-full font-semibold text-gray-700 whitespace-nowrap">Watches</button>
            </div>
            <select class="bg-white border border-gray-200 px-4 py-2 rounded-lg text-gray-700 focus:outline-none focus:ring-2 focus:ring-accent w-full md:w-auto">
                <option>Featured</option>
                <option>Price: Low to High</option>
                <option>Price: High to Low</option>
                <option>Newest Arrivals</option>
            </select>
        </div>

        <div id="all-products-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            <!-- Dynamically injected items go here via JS -->
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
